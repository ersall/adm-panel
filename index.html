<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ADM Panel">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ADM Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#050505;--card:#111;--gold:#d6af5e;--gold2:#f3d98b;--text:#f5f1e8;--muted:#9b9488;--line:rgba(255,255,255,.12)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at 18% 0%,rgba(214,175,94,.22),transparent 30%),linear-gradient(145deg,#030303,#080808 60%,#11100b);color:var(--text);padding:env(safe-area-inset-top) 14px calc(18px + env(safe-area-inset-bottom));min-height:100vh}
.app{max-width:560px;margin:0 auto}
.top{position:sticky;top:0;z-index:20;padding:14px 0 12px;background:linear-gradient(180deg,rgba(5,5,5,.96),rgba(5,5,5,.72));backdrop-filter:blur(16px)}
.brand{display:flex;align-items:center;justify-content:space-between;gap:12px}
.left{display:flex;align-items:center;gap:12px}
.logo{width:52px;height:52px;border-radius:18px;border:1px solid rgba(214,175,94,.55);display:grid;place-items:center;color:var(--gold2);font-weight:950;font-size:18px;background:linear-gradient(145deg,rgba(214,175,94,.2),rgba(255,255,255,.035));box-shadow:0 0 40px rgba(214,175,94,.12)}
h1{font-size:22px;margin:0}.sub{color:var(--muted);font-size:12px;margin-top:3px}
.iconBtn{width:44px;height:44px;border-radius:15px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--gold2);font-weight:950}
.card{background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:24px;padding:16px;margin:14px 0;box-shadow:0 24px 80px rgba(0,0,0,.28)}
.status{border:1px solid rgba(214,175,94,.28);background:rgba(214,175,94,.075);color:var(--gold2);padding:12px;border-radius:16px;font-weight:850;font-size:13px;line-height:1.35}
.status.ok{border-color:rgba(124,255,155,.28);background:rgba(124,255,155,.07);color:#baffcc}.status.bad{border-color:rgba(255,125,125,.28);background:rgba(255,125,125,.07);color:#ffb3b3}
label{display:block;color:var(--gold2);font-size:11px;font-weight:950;letter-spacing:1.2px;text-transform:uppercase;margin:13px 0 7px}
input,select{width:100%;height:50px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:#151515;color:var(--text);padding:0 14px;font-size:16px;font-weight:800;outline:none}
input:focus,select:focus{border-color:rgba(214,175,94,.7);box-shadow:0 0 0 4px rgba(214,175,94,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--text);min-height:48px;border-radius:16px;padding:12px 14px;font-weight:950;font-size:14px}
button:active{transform:scale(.985)}.gold{background:linear-gradient(135deg,#f3d98b,#9d742d);color:#070707;border:0;box-shadow:0 14px 34px rgba(214,175,94,.12)}.red{border-color:rgba(255,80,80,.35);background:rgba(255,80,80,.09);color:#ffb3b3}.green{border-color:rgba(124,255,155,.32);background:rgba(124,255,155,.08);color:#baffcc}
.list{display:grid;gap:12px;margin-bottom:24px}.license{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:22px;padding:14px}
.licTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.key{color:var(--gold2);font-size:15px;font-weight:950;word-break:break-all;line-height:1.3}
.badge{padding:6px 10px;border-radius:999px;font-size:10px;font-weight:950;text-transform:uppercase;border:1px solid var(--line)}.badge.active{color:#baffcc;border-color:rgba(124,255,155,.35);background:rgba(124,255,155,.08)}.badge.blocked{color:#ffb3b3;border-color:rgba(255,80,80,.35);background:rgba(255,80,80,.08)}
.meta{color:var(--muted);font-size:13px;line-height:1.55;margin-top:10px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.actions .wide{grid-column:1/-1}
.toast{position:fixed;left:14px;right:14px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:50;max-width:560px;margin:auto;padding:14px 16px;border-radius:18px;border:1px solid rgba(214,175,94,.42);background:rgba(10,10,10,.96);color:var(--gold2);font-weight:950;display:none}.toast.show{display:block;animation:pop .16s ease}@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.empty{color:var(--muted);text-align:center;padding:20px}.smallNote{font-size:12px;color:var(--muted);line-height:1.45;margin-top:10px}
@media(max-width:420px){.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}h1{font-size:20px}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="brand"><div class="left"><div class="logo">ADM</div><div><h1>ADM Panel</h1><div class="sub">License control • Mobile</div></div></div><button class="iconBtn" onclick="loadKeys()">↻</button></div></div>
  <div class="card"><div id="setupStatus" class="status">Проверка подключения...</div><div class="smallNote">Панель уже подключена к твоему Supabase.</div></div>
  <div class="card">
    <label>Лицензионный ключ</label><div class="grid"><input id="key" placeholder="ETM-XXXX-XXXX-XXXX"><button onclick="generateKey()">Сгенерировать</button></div>
    <label>Клиент / клуб</label><input id="client" placeholder="Например: Avatar PS Club">
    <div class="grid"><div><label>Срок</label><select id="period"><option value="lifetime">Навсегда</option><option value="30">30 дней</option><option value="90">90 дней</option><option value="365">1 год</option></select></div><div><label>Статус</label><select id="status"><option value="active">active</option><option value="blocked">blocked</option></select></div></div>
    <div class="grid" style="margin-top:12px"><button class="gold" onclick="addKey()">Создать</button><button onclick="clearForm()">Очистить</button></div>
  </div>
  <div class="card"><label>Поиск</label><input id="search" placeholder="Ключ или клиент" oninput="filterList()"><button class="gold" style="width:100%;margin-top:12px" onclick="loadKeys()">Показать лицензии</button></div>
  <div id="list" class="list"></div>
</div>
<div id="toast" class="toast">Готово</div>
<script>
const SUPABASE_URL = "https://fyggrpvpwmomavcbxnfm.supabase.co";
const SUPABASE_KEY = "sb_publishable_rpUMWnPR_S5EqxsvZnNDEA_4D_mYbcD";
let supabaseClient = null;
let allLicenses = [];
function toast(text){const el=document.getElementById("toast");el.innerText=text;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2300);}
function init(){const st=document.getElementById("setupStatus");if(!window.supabase){st.className="status bad";st.innerText="Supabase не загрузился. Проверь интернет.";return false;}try{supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);st.className="status ok";st.innerText="Подключено. Панель готова.";return true;}catch(e){st.className="status bad";st.innerText="Ошибка: "+e.message;return false;}}
function requireClient(){if(!supabaseClient)init();if(!supabaseClient){toast("Нет подключения к Supabase");return false;}return true;}
function generateKey(){const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";const part=n=>Array.from({length:n},()=>chars[Math.floor(Math.random()*chars.length)]).join("");document.getElementById("key").value=`ETM-${part(4)}-${part(4)}-${part(4)}`;toast("Ключ создан");}
function getExpiresAt(){const p=document.getElementById("period").value;if(p==="lifetime")return null;const d=new Date();d.setDate(d.getDate()+Number(p));return d.toISOString();}
async function addKey(){if(!requireClient())return;const license_key=document.getElementById("key").value.trim().toUpperCase();const client_name=document.getElementById("client").value.trim();const status=document.getElementById("status").value;const expires_at=getExpiresAt();if(!license_key){toast("Сначала сгенерируй ключ");return;}if(!client_name){toast("Напиши имя клиента");return;}const {error}=await supabaseClient.from("licenses").insert([{license_key,client_name,status,expires_at}]);if(error){toast("Ошибка: "+error.message);return;}toast("Лицензия создана");clearForm();loadKeys();}
function clearForm(){document.getElementById("key").value="";document.getElementById("client").value="";document.getElementById("period").value="lifetime";document.getElementById("status").value="active";}
async function loadKeys(){if(!requireClient())return;const {data,error}=await supabaseClient.from("licenses").select("*").order("id",{ascending:false});if(error){toast("Ошибка: "+error.message);return;}allLicenses=data||[];render(allLicenses);}
function filterList(){const q=document.getElementById("search").value.toLowerCase().trim();if(!q){render(allLicenses);return;}render(allLicenses.filter(x=>String(x.license_key||"").toLowerCase().includes(q)||String(x.client_name||"").toLowerCase().includes(q)));}
function dateText(x){if(!x)return "Навсегда";try{return new Date(x).toLocaleDateString("ru-RU");}catch{return x;}}
function seenText(x){if(!x)return "не заходил";try{return new Date(x).toLocaleString("ru-RU");}catch{return x;}}
function render(data){const box=document.getElementById("list");if(!data.length){box.innerHTML='<div class="card empty">Лицензий пока нет</div>';return;}box.innerHTML=data.map(x=>`<div class="license"><div class="licTop"><div class="key" onclick="copyKey('${escAttr(x.license_key)}')">${esc(x.license_key)}</div><div class="badge ${x.status==='active'?'active':'blocked'}">${esc(x.status||'')}</div></div><div class="meta">Клиент: <b>${esc(x.client_name||'-')}</b><br>Срок: ${esc(dateText(x.expires_at))}<br>Device: ${esc(x.device_id||'не активирован')}<br>Last seen: ${esc(seenText(x.last_seen))}<br>Создан: ${esc(dateText(x.created_at))}</div><div class="actions"><button class="green" onclick="setStatus(${x.id},'active')">Active</button><button class="red" onclick="setStatus(${x.id},'blocked')">Block</button><button class="wide" onclick="copyKey('${escAttr(x.license_key)}')">Copy Key</button><button class="wide red" onclick="deleteKey(${x.id})">Delete</button></div></div>`).join("");}
async function setStatus(id,status){if(!requireClient())return;const {error}=await supabaseClient.from("licenses").update({status}).eq("id",id);if(error){toast("Ошибка: "+error.message);return;}toast(status==="active"?"Активировано":"Заблокировано");loadKeys();}
async function deleteKey(id){if(!confirm("Удалить лицензию?"))return;const {error}=await supabaseClient.from("licenses").delete().eq("id",id);if(error){toast("Ошибка: "+error.message);return;}toast("Удалено");loadKeys();}
async function copyKey(k){try{await navigator.clipboard.writeText(k);toast("Ключ скопирован");}catch{toast(k);}}
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");}
function escAttr(v){return String(v??"").replaceAll("\\","\\\\").replaceAll("'","\\'").replaceAll('"','\\"');}
generateKey();init();setTimeout(()=>{if(supabaseClient)loadKeys();},300);
</script>
</body>
</html>
