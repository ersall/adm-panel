<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ADM Panel">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ADM Panel</title>
<link rel="apple-touch-icon" sizes="180x180" href="./icon.png?v=50">
<link rel="icon" type="image/png" href="./icon.png?v=50">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#d6af5e;--gold2:#f8dd8e;--text:#f8f3ea;--muted:#a0988e;--line:rgba(255,255,255,.12)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,select{-webkit-user-select:text;user-select:text}
html,body{margin:0;min-height:100%;background:#050505;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
body{padding:0 14px calc(96px + env(safe-area-inset-bottom));background:radial-gradient(circle at 12% -5%,rgba(214,175,94,.24),transparent 34%),linear-gradient(160deg,#030303,#080808 58%,#11100c)}
.app{max-width:560px;margin:0 auto;padding-top:calc(14px + env(safe-area-inset-top))}
.splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(circle at 50% 20%,rgba(214,175,94,.26),transparent 32%),linear-gradient(160deg,#030303,#090909 60%,#141006);transition:.45s}
.splash.hide{opacity:0;transform:scale(1.02);pointer-events:none}
.splashLogo{width:112px;height:112px;border-radius:32px;border:1px solid rgba(214,175,94,.65);display:grid;place-items:center;color:var(--gold2);font-size:34px;font-weight:1000;background:linear-gradient(145deg,rgba(214,175,94,.24),rgba(255,255,255,.045));box-shadow:0 0 76px rgba(214,175,94,.18)}
.splashTitle{font-size:28px;font-weight:1000;margin-top:18px}.splashSub{font-size:13px;color:var(--muted);margin-top:6px}
.loader{width:190px;height:5px;border-radius:99px;background:rgba(255,255,255,.11);overflow:hidden;margin-top:26px}.loader i{display:block;width:45%;height:100%;background:linear-gradient(90deg,transparent,var(--gold2),transparent);animation:load 1s infinite}@keyframes load{from{transform:translateX(-100%)}to{transform:translateX(260%)}}
.top{position:sticky;top:0;z-index:20;padding:10px 0 12px;background:linear-gradient(180deg,rgba(5,5,5,.98),rgba(5,5,5,.82),transparent);backdrop-filter:blur(18px)}
.appbar{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid rgba(255,255,255,.10);background:rgba(10,10,10,.58);border-radius:26px;padding:10px 10px 10px 12px;box-shadow:0 18px 60px rgba(0,0,0,.24)}
.brand{display:flex;align-items:center;gap:11px}.logo{width:50px;height:50px;border-radius:18px;border:1px solid rgba(214,175,94,.58);display:grid;place-items:center;color:var(--gold2);font-weight:1000;font-size:17px;background:linear-gradient(145deg,rgba(214,175,94,.22),rgba(255,255,255,.04))}
h1{font-size:21px;margin:0;line-height:1.05}.sub{font-size:12px;color:var(--muted);margin-top:3px}
.round{width:48px;height:48px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--gold2);font-size:20px;font-weight:1000}
.status{margin:12px 0;border:1px solid rgba(141,255,172,.25);background:rgba(141,255,172,.07);color:#caffd6;border-radius:22px;padding:13px 14px;font-weight:950}.status.bad{border-color:rgba(255,134,134,.28);background:rgba(255,134,134,.08);color:#ffd0d0}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}.stat{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:20px;padding:13px 11px}.num{font-size:24px;color:var(--gold2);font-weight:1000}.lbl{font-size:11px;color:var(--muted);margin-top:5px}
.card{border:1px solid var(--line);background:rgba(15,15,16,.94);border-radius:30px;padding:18px;margin:14px 0;box-shadow:0 30px 90px rgba(0,0,0,.28)}.title{color:var(--gold2);font-size:12px;font-weight:1000;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:12px}
label{display:block;color:var(--gold2);font-size:11px;font-weight:1000;letter-spacing:1.2px;text-transform:uppercase;margin:13px 0 7px}
input,select{width:100%;height:56px;border-radius:20px;border:1px solid rgba(255,255,255,.13);background:#151516;color:var(--text);padding:0 16px;font-size:16px;font-weight:850;outline:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}button{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);min-height:54px;border-radius:19px;padding:12px 14px;font-size:15px;font-weight:1000}.gold{color:#080808;border:0;background:linear-gradient(135deg,#ffeaa8,#d4aa4f 55%,#8d6420)}.green{border-color:rgba(141,255,172,.28);background:rgba(141,255,172,.08);color:#caffd6}.red{border-color:rgba(255,134,134,.28);background:rgba(255,134,134,.08);color:#ffb8b8}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.tab{min-height:42px;border-radius:15px;font-size:13px}.tab.active{background:rgba(214,175,94,.15);border-color:rgba(214,175,94,.45);color:var(--gold2)}
.page{display:none}.page.active{display:block}.list{display:grid;gap:12px;margin-top:12px}.license{border:1px solid var(--line);background:linear-gradient(145deg,rgba(255,255,255,.055),rgba(255,255,255,.025));border-radius:24px;padding:15px}.licTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.key{color:var(--gold2);font-size:15px;font-weight:1000;word-break:break-all;line-height:1.25}.badge{padding:6px 10px;border-radius:999px;font-size:10px;font-weight:1000;text-transform:uppercase;border:1px solid var(--line)}.badge.active{color:#caffd6;border-color:rgba(141,255,172,.34);background:rgba(141,255,172,.08)}.badge.blocked{color:#ffb8b8;border-color:rgba(255,134,134,.34);background:rgba(255,134,134,.08)}.meta{color:var(--muted);font-size:13px;line-height:1.55;margin-top:10px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px}.empty{text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,.14);border-radius:24px;padding:24px 16px}
.nav{position:fixed;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:40;max-width:560px;margin:auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;border:1px solid rgba(255,255,255,.14);background:rgba(10,10,10,.80);backdrop-filter:blur(20px);border-radius:28px;padding:8px;box-shadow:0 20px 90px rgba(0,0,0,.45)}
.nav button{min-height:54px;border-radius:20px;font-size:12px;padding:7px 5px;color:var(--muted)}.nav button.active{color:var(--gold2);background:rgba(214,175,94,.13);border-color:rgba(214,175,94,.38)}
.toast{position:fixed;left:14px;right:14px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:60;max-width:560px;margin:auto;padding:14px 16px;border-radius:18px;border:1px solid rgba(214,175,94,.44);background:rgba(10,10,10,.96);color:var(--gold2);font-weight:1000;display:none}.toast.show{display:block}.mini{font-size:12px;color:var(--muted);line-height:1.45}
@media(max-width:420px){.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}h1{font-size:20px}}
</style>
</head>
<body>
<div id="splash" class="splash"><div class="splashLogo">ADM</div><div class="splashTitle">ADM Panel</div><div class="splashSub">License Control System</div><div class="loader"><i></i></div></div>
<div class="app">
 <div class="top"><div class="appbar"><div class="brand"><div class="logo">ADM</div><div><h1>ADM Panel</h1><div class="sub">Mobile License Control v4</div></div></div><button class="round" onclick="loadKeys()">↻</button></div>
  <div id="status" class="status">Проверка подключения...</div><div class="stats"><div class="stat"><div id="sAll" class="num">0</div><div class="lbl">Всего</div></div><div class="stat"><div id="sAct" class="num">0</div><div class="lbl">Active</div></div><div class="stat"><div id="sBlk" class="num">0</div><div class="lbl">Blocked</div></div></div></div>
 <section id="create" class="page active"><div class="card"><div class="title">Создать лицензию</div><label>Лицензионный ключ</label><div class="grid"><input id="key" placeholder="ETM-XXXX-XXXX-XXXX"><button onclick="gen()">Сгенерировать</button></div><label>Клиент / клуб</label><input id="client" placeholder="Например: Avatar PS Club"><div class="grid"><div><label>Срок</label><select id="period"><option value="lifetime">Навсегда</option><option value="7">7 дней</option><option value="30">30 дней</option><option value="90">90 дней</option><option value="365">1 год</option></select></div><div><label>Статус</label><select id="newStatus"><option value="active">active</option><option value="blocked">blocked</option></select></div></div><div class="grid" style="margin-top:14px"><button class="gold" onclick="addKey()">Создать</button><button onclick="clearForm()">Очистить</button></div></div></section>
 <section id="licenses" class="page"><div class="card"><div class="title">Лицензии</div><input id="search" placeholder="Поиск ключа или клиента" oninput="render()"><div class="tabs"><button id="tall" class="tab active" onclick="filter='all';tabs();render()">Все</button><button id="tactive" class="tab" onclick="filter='active';tabs();render()">Active</button><button id="tblocked" class="tab" onclick="filter='blocked';tabs();render()">Blocked</button></div></div><div id="list" class="list"></div></section>
 <section id="info" class="page"><div class="card"><div class="title">Инфо</div><div class="mini">Панель работает через Supabase. Создавай, блокируй и удаляй лицензии с телефона.</div><button class="gold" style="width:100%;margin-top:14px" onclick="loadKeys()">Обновить базу</button></div></section>
</div>
<div class="nav"><button id="ncreate" class="active" onclick="page('create')">＋<br>Создать</button><button id="nlicenses" onclick="page('licenses')">▤<br>Лицензии</button><button id="ninfo" onclick="page('info')">ⓘ<br>Инфо</button></div><div id="toast" class="toast"></div>
<script>
const SUPABASE_URL="https://fyggrpvpwmomavcbxnfm.supabase.co";
const SUPABASE_KEY="sb_publishable_rpUMWnPR_S5EqxsvZnNDEA_4D_mYbcD";
let sb=null,data=[],filter="all";
window.addEventListener("load",()=>setTimeout(()=>document.getElementById("splash").classList.add("hide"),950));
function toast(t){let e=document.getElementById("toast");e.innerText=t;e.classList.add("show");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("show"),2200)}
function status(t,bad=false){let e=document.getElementById("status");e.innerText=t;e.className="status"+(bad?" bad":"")}
function init(){try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);status("Подключено. Панель готова.");return true}catch(e){status("Ошибка подключения",true);return false}}
function req(){if(!sb)init();if(!sb){toast("Нет подключения");return false}return true}
function page(id){document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));document.getElementById(id).classList.add("active");document.getElementById("n"+id).classList.add("active");if(id==="licenses")loadKeys()}
function gen(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";const p=n=>Array.from({length:n},()=>c[Math.floor(Math.random()*c.length)]).join("");document.getElementById("key").value=`ETM-${p(4)}-${p(4)}-${p(4)}`}
function exp(){let p=document.getElementById("period").value;if(p==="lifetime")return null;let d=new Date();d.setDate(d.getDate()+Number(p));return d.toISOString()}
async function addKey(){if(!req())return;let license_key=document.getElementById("key").value.trim().toUpperCase(),client_name=document.getElementById("client").value.trim(),status=document.getElementById("newStatus").value,expires_at=exp();if(!license_key||!client_name)return toast("Заполни ключ и клиента");let r=await sb.from("licenses").insert([{license_key,client_name,status,expires_at}]);if(r.error)return toast(r.error.message);toast("Лицензия создана");clearForm();loadKeys();page("licenses")}
function clearForm(){document.getElementById("client").value="";document.getElementById("period").value="lifetime";document.getElementById("newStatus").value="active";gen()}
async function loadKeys(){if(!req())return;let r=await sb.from("licenses").select("*").order("id",{ascending:false});if(r.error)return toast(r.error.message);data=r.data||[];stats();render()}
function stats(){document.getElementById("sAll").innerText=data.length;document.getElementById("sAct").innerText=data.filter(x=>x.status==="active").length;document.getElementById("sBlk").innerText=data.filter(x=>x.status==="blocked").length}
function tabs(){["all","active","blocked"].forEach(x=>document.getElementById("t"+x).classList.toggle("active",filter===x))}
function dt(x){if(!x)return"Навсегда";try{return new Date(x).toLocaleDateString("ru-RU")}catch{return x}}
function seen(x){if(!x)return"не заходил";try{return new Date(x).toLocaleString("ru-RU")}catch{return x}}
function render(){let s=document.getElementById("search");let q=s?s.value.toLowerCase().trim():"";let arr=data.filter(x=>(filter==="all"||x.status===filter)&&(!q||String(x.license_key).toLowerCase().includes(q)||String(x.client_name).toLowerCase().includes(q)));document.getElementById("list").innerHTML=arr.length?arr.map(x=>`<div class="license"><div class="licTop"><div class="key" onclick="copyKey('${escA(x.license_key)}')">${esc(x.license_key)}</div><div class="badge ${x.status==='active'?'active':'blocked'}">${esc(x.status)}</div></div><div class="meta">Клиент: <b>${esc(x.client_name||'-')}</b><br>Срок: ${dt(x.expires_at)}<br>Device: ${esc(x.device_id||'не активирован')}<br>Last seen: ${seen(x.last_seen)}<br>Создан: ${dt(x.created_at)}</div><div class="actions"><button class="green" onclick="setSt(${x.id},'active')">Active</button><button class="red" onclick="setSt(${x.id},'blocked')">Block</button><button onclick="copyKey('${escA(x.license_key)}')">Copy</button><button class="red" onclick="delKey(${x.id})">Delete</button></div></div>`).join(""):'<div class="empty">Ничего не найдено</div>'}
async function setSt(id,s){let r=await sb.from("licenses").update({status:s}).eq("id",id);if(r.error)return toast(r.error.message);toast(s==="active"?"Активно":"Заблокировано");loadKeys()}
async function delKey(id){if(!confirm("Удалить лицензию?"))return;let r=await sb.from("licenses").delete().eq("id",id);if(r.error)return toast(r.error.message);toast("Удалено");loadKeys()}
async function copyKey(k){try{await navigator.clipboard.writeText(k);toast("Ключ скопирован")}catch{toast(k)}}
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
function escA(v){return String(v??"").replaceAll("\\","\\\\").replaceAll("'","\\'").replaceAll('"','\\"')}
gen();init();setTimeout(()=>{if(sb)loadKeys()},350);
</script>
</body>
</html>
